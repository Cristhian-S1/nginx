upstream validador_replicas {
    # Round-Robin (default NGINX) — stateless, carga uniforme
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Frontend estático — servido directamente por NGINX
    root /opt/validador-tx/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API de validación — proxy hacia las réplicas Go
    location /validar {
        proxy_pass         http://validador_replicas;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;

        # CORS para el frontend
        add_header Access-Control-Allow-Origin *;
    }

    # Health check directo por réplica (útil para diagnóstico)
    location /health {
        proxy_pass         http://validador_replicas;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }
}
