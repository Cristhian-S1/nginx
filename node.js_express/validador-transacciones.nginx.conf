# /etc/nginx/sites-available/validador-transacciones
# Copiar este archivo a: /etc/nginx/sites-available/validador-transacciones
# Luego ejecutar:
#   sudo ln -s /etc/nginx/sites-available/validador-transacciones /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

upstream validador_cluster {
    least_conn;  # Algoritmo: Least Connections

    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    server 127.0.0.1:3003;

    # Keepalive: mantiene conexiones abiertas hacia los backends
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # Reemplaza con tu dominio si aplica

    location /validar {
        proxy_pass         http://validador_cluster;
        proxy_http_version 1.1;

        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Timeouts conservadores para servicio crítico
        proxy_connect_timeout  5s;
        proxy_send_timeout     10s;
        proxy_read_timeout     10s;
    }
}
